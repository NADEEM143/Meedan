<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meedan Premium - Verified Giveaway</title>
    <style>
        :root { 
            --primary: #00f2ff; 
            --accent: #7000ff; 
            --bg: #020204; 
            --card: rgba(10, 10, 15, 0.9); 
            --yt-red: #FF0000; 
            --gold: #ffd700; 
            --silver: #e0e0e0; 
            --bronze: #cd7f32; 
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            background: radial-gradient(circle at 0% 0%, #12002e 0%, #020204 50%),
                        radial-gradient(circle at 100% 100%, #001a2e 0%, #020204 50%);
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        /* --- Elite Header --- */
        .donate-header { 
            width: 100%; 
            background: rgba(255, 0, 0, 0.1);
            backdrop-filter: blur(15px);
            color: white; 
            padding: 18px 0; 
            text-align: center; 
            font-weight: 800; 
            border-bottom: 1px solid rgba(255,0,0,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 13px;
        }
        .upi-id { display: block; font-size: 22px; margin-top: 8px; color: #ffeb3b; letter-spacing: 4px; font-family: monospace; }
        
        /* --- Prize Cards --- */
        .prize-section { 
            width: 100%; 
            padding: 30px 0; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            flex-wrap: wrap; 
        }
        .prize-card { 
            padding: 12px 24px; 
            border-radius: 100px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--glass-border); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-weight: 800; 
            font-size: 14px;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }
        .prize-card:hover { transform: scale(1.05); background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
        .p1 { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); }
        .p2 { border-color: var(--silver); color: var(--silver); }
        .p3 { border-color: var(--bronze); color: var(--bronze); }

        /* --- Main Elite Container --- */
        .container { 
            background: var(--card); 
            padding: 50px; 
            border-radius: 40px; 
            width: 500px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8); 
            border: 1px solid var(--glass-border); 
            margin: 20px 0; 
            backdrop-filter: blur(30px);
            transition: border-color 0.5s;
        }

        .logo-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .yt-icon-wrapper { display: flex; align-items: center; gap: 8px; }
        .yt-play-btn { background: var(--yt-red); width: 42px; height: 30px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }
        .yt-play-btn::after { content: ''; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid white; margin-left: 3px; }
        .yt-text { color: white; font-weight: 900; font-size: 22px; letter-spacing: -1px; }
        .channel-name-premium { font-size: 32px; font-weight: 900; letter-spacing: -2px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .count-badge { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin-bottom: 25px; font-weight: 800; opacity: 0.8; }
        
        textarea { 
            width: 100%; height: 120px; background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--glass-border); border-radius: 20px; color: #fff; 
            padding: 20px; font-size: 16px; resize: none; outline: none; transition: 0.3s;
            box-sizing: border-box; font-weight: 500;
        }
        textarea:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.6); }

        /* --- Premium Buttons --- */
        .btn-group { display: flex; gap: 20px; margin-top: 25px; }
        button { 
            background: linear-gradient(135deg, var(--accent), #ff00c8); 
            color: white; border: none; padding: 22px; font-size: 20px; font-weight: 900; 
            border-radius: 20px; cursor: pointer; flex: 2; transition: all 0.4s; 
            box-shadow: 0 10px 30px rgba(112, 0, 255, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
            position: relative; overflow: hidden;
        }
        button::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform: rotate(45deg); transition: 0.6s; }
        button:hover::before { left: 100%; }
        button:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(112, 0, 255, 0.5); }

        button:disabled { background: #1a1a24 !important; color: #444 !important; box-shadow: none !important; cursor: not-allowed; transform: none !important; }

        #removeBtn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); flex: 1; font-size: 14px; }
        .download-btn { background: transparent; border: 1px solid var(--glass-border); flex: 1; font-size: 11px; margin-top: 15px; padding: 14px; font-weight: 700; color: #666; letter-spacing: 1px; }
        .download-btn:hover { border-color: #fff; color: #fff; }

        /* --- Result Area --- */
        #display-area { height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 30px; border-top: 1px solid var(--glass-border); }
        
        .congrats-label { 
            font-size: 12px; text-transform: uppercase; letter-spacing: 5px; color: #ffcc00; 
            font-weight: 900; margin-bottom: 8px; display: none; 
            text-shadow: 0 0 15px #ff4500; animation: firePulse 0.8s infinite alternate;
        }
        @keyframes firePulse { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } }

        .winner-text { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 0 40px var(--primary); animation: winnerJump 0.6s infinite alternate; letter-spacing: -1px; }
        
        .verify-wrapper { display: flex; align-items: center; gap: 15px; margin-top: 20px; }
        .verify-code-box { background: #ffeb3b; color: #000; padding: 8px 18px; border-radius: 10px; font-size: 14px; font-weight: 900; box-shadow: 0 5px 15px rgba(255, 235, 59, 0.4); }
        .copy-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-size: 12px; cursor: pointer; font-weight: 800; }
        
        @keyframes winnerJump { from { transform: translateY(0) scale(1); } to { transform: translateY(-5px) scale(1.05); } }
        .shuffling { font-size: 34px; color: var(--primary); font-weight: 900; opacity: 0.6; filter: blur(1px); }
        
        /* --- History --- */
        .history-container { text-align: left; background: rgba(0, 0, 0, 0.3); padding: 25px; border-radius: 25px; border: 1px solid var(--glass-border); margin-top: 20px; }
        #historyList { list-style: none; padding: 0; margin: 0; max-height: 220px; overflow-y: auto; }
        #historyList li { padding: 15px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; gap: 8px; }
        .hist-top { display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 16px; }
        .hist-verify { font-size: 10px; color: #444; font-family: 'Courier New', Courier, monospace; text-transform: uppercase; letter-spacing: 2px; }

        /* Custom Scrollbar */
        #historyList::-webkit-scrollbar { width: 3px; }
        #historyList::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="donate-header">📢 PARTICIPATE: WITH RS 1 ONLY <span class="upi-id">nadimsbi147@ybl</span></div>

<div class="prize-section">
    <div class="prize-card p1">🥇 1st Prize: Rs 51</div>
    <div class="prize-card p2">🥈 2nd Prize: Rs 31</div>
    <div class="prize-card p3">🥉 3rd Prize: Rs 25</div>
</div>

<div class="container" id="mainContainer">
    <div class="logo-box">
        <div class="yt-icon-wrapper">
            <div class="yt-play-btn"></div>
            <span class="yt-text">YouTube</span>
        </div>
        <span class="channel-name-premium">MEEDAN</span>
    </div>

    <div id="counter" class="count-badge">--- Active Contestants: 0 ---</div>
    <textarea id="nameList" placeholder="Paste contestant names list here..." oninput="updateCount()"></textarea>

    <div class="btn-group">
        <button id="rollBtn" onclick="startRoll()">🚀 SPIN NOW</button>
        <button id="removeBtn" onclick="removeWinner()">REMOVE</button>
    </div>

    <div class="btn-group">
        <button class="download-btn" onclick="exportParticipantsExcel()">📄 SAVE NAMES</button>
        <button class="download-btn" onclick="exportWinnersExcel()">📄 SAVE LOGS</button>
    </div>

    <div id="display-area">
        <div id="status" style="font-size:11px; color:#444; text-transform:uppercase; margin-bottom:10px; font-weight: 900; letter-spacing: 2px;">System Ready</div>
        <div id="congrats" class="congrats-label">Winner Selection Verified</div>
        <div id="result" class="shuffling">---</div>
        <div id="verifyArea" class="verify-wrapper" style="display:none;">
            <div id="verifyCode" class="verify-code-box"></div>
            <button id="copyBtn" class="copy-btn" onclick="copyCode()">COPY ID</button>
        </div>
    </div>

    <div class="history-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span style="font-size:11px; color:#555; font-weight: 900; letter-spacing: 1px;">AUTHENTICATED HISTORY</span>
            <button style="font-size:10px; color:#ff4d4d; background:none; border:none; cursor:pointer; font-weight: 800;" onclick="clearHistory()">RESET</button>
        </div>
        <ul id="historyList"></ul>
    </div>
</div>

<script>
    let winCount = 0;
    let winnersArray = [];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTickSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playClickSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "square";
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    window.onload = function() {
        const savedNames = localStorage.getItem('meedan_names');
        if(savedNames) { document.getElementById('nameList').value = savedNames; updateCount(); }
        const savedWinners = localStorage.getItem('meedan_winners');
        if(savedWinners) { 
            winnersArray = JSON.parse(savedWinners); 
            winCount = winnersArray.length; 
            refreshHistoryUI(); 
        }
    };

    function updateCount() {
        const names = getNames();
        document.getElementById('counter').innerText = `--- Active Contestants: ${names.length} ---`;
        localStorage.setItem('meedan_names', document.getElementById('nameList').value);
    }

    function getNames() { return document.getElementById('nameList').value.split('\n').map(n => n.trim()).filter(n => n !== ""); }
    function generateVerifyCode() { return 'MD-' + Math.random().toString(36).substr(2, 6).toUpperCase(); }

    function startRoll() {
        const names = getNames();
        if (names.length === 0) return alert("Please enter names!");
        
        if (audioCtx.state === 'suspended') audioCtx.resume();
        playClickSound();

        const spinBtn = document.getElementById('rollBtn');
        spinBtn.disabled = true;
        
        document.getElementById('removeBtn').style.display = "none";
        document.getElementById('verifyArea').style.display = "none";
        document.getElementById('congrats').style.display = "none";
        document.getElementById('status').innerText = "GENERATING ELITE HASH...";
        
        let currentDelay = 50; 
        let totalTime = 0;
        const maxTime = 10000; 

        const performRoll = () => {
            const randomIndex = Math.floor(Math.random() * names.length);
            document.getElementById('result').innerText = names[randomIndex];
            document.getElementById('result').className = "shuffling";
            
            playTickSound();
            totalTime += currentDelay;
            
            if (totalTime < 6000) currentDelay = 50; 
            else if (totalTime < 8500) currentDelay += 20; 
            else currentDelay += 60; 

            if (totalTime < maxTime) {
                setTimeout(performRoll, currentDelay);
            } else {
                finalizeWinner(names[randomIndex]); 
                spinBtn.disabled = false; 
            }
        };
        performRoll();
    }

    function finalizeWinner(winner) {
        winCount++;
        const vCode = generateVerifyCode();
        const time = new Date().toLocaleTimeString();
        
        let prize = "Standard Entry";
        if(winCount === 1) prize = "Rs 51";
        else if(winCount === 2) prize = "Rs 31";
        else if(winCount === 3) prize = "Rs 25";

        document.getElementById('congrats').style.display = "block";
        document.getElementById('result').innerText = "🏆 " + winner;
        document.getElementById('result').className = "winner-text";
        document.getElementById('verifyCode').innerText = vCode;
        document.getElementById('verifyArea').style.display = "flex";
        document.getElementById('removeBtn').style.display = "block";
        document.getElementById('status').innerText = "ELITE WINNER VERIFIED";
        
        // Elite Glow Effect
        document.getElementById('mainContainer').style.borderColor = "var(--primary)";
        setTimeout(() => { document.getElementById('mainContainer').style.borderColor = ""; }, 2000);

        winnersArray.push({ "Rank": winCount, "Name": winner, "Prize": prize, "Code": vCode, "Time": time });
        localStorage.setItem('meedan_winners', JSON.stringify(winnersArray));
        refreshHistoryUI();
    }

    function refreshHistoryUI() {
        const historyList = document.getElementById('historyList');
        if(!historyList) return;
        historyList.innerHTML = "";
        [...winnersArray].reverse().forEach(win => {
            let color = "white";
            if(win.Rank === 1) color = "var(--gold)";
            else if(win.Rank === 2) color = "var(--silver)";
            else if(win.Rank === 3) color = "var(--bronze)";

            const li = document.createElement('li');
            li.innerHTML = `<div class="hist-top" style="color: ${color} !important;">🏆 #${win.Rank} ${win.Name} (${win.Prize})</div><div class="hist-verify">ID: ${win.Code} | ${win.Time}</div>`;
            historyList.appendChild(li);
        });
    }

    function copyCode() {
        navigator.clipboard.writeText(document.getElementById('verifyCode').innerText);
        const btn = document.getElementById('copyBtn');
        btn.innerText = "COPIED";
        setTimeout(() => { btn.innerText = "COPY ID"; }, 2000);
    }

    function removeWinner() {
        const winnerText = document.getElementById('result').innerText.replace("🏆 ", "");
        document.getElementById('nameList').value = getNames().filter(n => n !== winnerText).join('\n');
        document.getElementById('removeBtn').style.display = "none";
        document.getElementById('congrats').style.display = "none";
        document.getElementById('result').innerText = "---";
        document.getElementById('result').className = "shuffling";
        document.getElementById('verifyArea').style.display = "none";
        updateCount();
    }

    function clearHistory() {
        if (confirm("System Reset? All records will be wiped.")) { winnersArray = []; winCount = 0; localStorage.removeItem('meedan_winners'); refreshHistoryUI(); }
    }

    function downloadTxt(filename, text) {
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
        element.setAttribute('download', filename);
        element.style.display = 'none';
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    function exportParticipantsExcel() {
        const names = getNames();
        if (names.length === 0) return alert("Empty database.");
        downloadTxt("Contestants_Elite.txt", names.join('\n'));
    }

    function exportWinnersExcel() {
        if (winnersArray.length === 0) return alert("No winners detected.");
        const log = winnersArray.map(w => `#${w.Rank} - ${w.Name} (${w.Prize}) | ID: ${w.Code} | ${w.Time}`).join('\n');
        downloadTxt("Elite_Winner_Log.txt", log);
    }
</script>
</body>
</html>
