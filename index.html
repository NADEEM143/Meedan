<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meedan Premium - Verified Giveaway</title>
    
    <!-- PWA REQUIRED META -->
    <meta name="theme-color" content="#020204">
    <link rel="manifest" id="pwa-manifest">

    <style>
        :root { 
            --primary: #00f2ff; --accent: #7000ff; --bg: #020204; 
            --card: rgba(10, 10, 15, 0.9); --yt-red: #FF0000; 
            --gold: #ffd700; --silver: #e0e0e0; --bronze: #cd7f32; 
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            background: radial-gradient(circle at 0% 0%, #12002e 0%, #020204 50%),
                        radial-gradient(circle at 100% 100%, #001a2e 0%, #020204 50%);
            color: white; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding-bottom: 60px; overflow-x: hidden; position: relative;
        }

        .donate-header { 
            width: 100%; background: rgba(255, 0, 0, 0.1); backdrop-filter: blur(15px);
            color: white; padding: 18px 0; text-align: center; font-weight: 800; 
            border-bottom: 1px solid rgba(255,0,0,0.3); letter-spacing: 2px;
            text-transform: uppercase; font-size: 13px; position: relative; z-index: 1000;
        }
        .upi-id { display: block; font-size: 22px; margin-top: 8px; color: #ffeb3b; letter-spacing: 4px; font-family: monospace; }
        
        .admin-trigger { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.4; font-size: 20px; transition: 0.3s; z-index: 9999 !important; pointer-events: all !important; display: inline-block !important; padding: 10px;  }
        .admin-trigger:hover { opacity: 1; color: var(--primary); transform: translateY(-50%) rotate(90deg); }
        
        #adminPanel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.98); border: 1px solid var(--primary);
            padding: 30px; border-radius: 24px; z-index: 9999; width: 320px;
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.2); backdrop-filter: blur(20px);
        }
        .admin-field { margin-bottom: 15px; text-align: left; }
        .admin-field label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 5px; font-weight: 800; }
        .admin-field input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; box-sizing: border-box; }

        .prize-section { width: 100%; padding: 30px 0; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .prize-card { padding: 12px 24px; border-radius: 100px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 14px; backdrop-filter: blur(10px); }
        .p1 { border-color: var(--gold); color: var(--gold); }
        .p2 { border-color: var(--silver); color: var(--silver); }
        .p3 { border-color: var(--bronze); color: var(--bronze); }

        .container { 
            background: var(--card); padding: 50px; border-radius: 40px; width: 500px; text-align: center; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8); border: 1px solid var(--glass-border); 
            margin: 20px 0; backdrop-filter: blur(30px); transition: 0.5s;  position: relative; z-index: 1;
        }

        .logo-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px; }
        #customLogo { max-width: 60px; max-height: 45px; object-fit: contain; display: none; border-radius: 8px; }
        .yt-icon-wrapper { display: flex; align-items: center; gap: 8px; }
        .yt-play-btn { background: var(--yt-red); width: 42px; height: 30px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }
        .yt-play-btn::after { content: ''; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid white; margin-left: 3px; }
        .channel-name-premium { font-size: 32px; font-weight: 900; letter-spacing: -2px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .count-badge { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin-bottom: 25px; font-weight: 800; }
        textarea { width: 100%; height: 120px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--glass-border); border-radius: 20px; color: #fff; padding: 20px; font-size: 16px; resize: none; outline: none; box-sizing: border-box; }

        .btn-group { display: flex; gap: 20px; margin-top: 25px; position: relative; z-index: 1; }
        button { background: linear-gradient(135deg, var(--accent), #ff00c8); color: white; border: none; padding: 22px; font-size: 20px; font-weight: 900; border-radius: 20px; cursor: pointer; flex: 2; transition: 0.4s; text-transform: uppercase; letter-spacing: 1px; }
        button:disabled { background: #1a1a24 !important; color: #444 !important; cursor: not-allowed; transform: none !important; }

        .download-btn { background: transparent; border: 1px solid var(--glass-border); flex: 1; font-size: 11px; margin-top: 15px; padding: 14px; font-weight: 700; color: #666; }
        
        #display-area { height: auto; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px; }
        .congrats-label { font-size: 12px; text-transform: uppercase; letter-spacing: 5px; color: #ffcc00; font-weight: 900; margin-bottom: 8px; display: none; text-shadow: 0 0 15px #ff4500; animation: firePulse 0.8s infinite alternate; }
        @keyframes firePulse { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } }
        .winner-text { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 0 40px var(--primary); animation: winnerJump 0.6s infinite alternate; }
        
        @keyframes winnerJump { from { transform: translateY(0); } to { transform: translateY(-5px); } }
        #claimTimer { font-size: 14px; color: #ff4d4d; font-weight: 800; margin-top: 10px; display: none; letter-spacing: 1px; }
        #noShowBtn { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; font-size: 10px; padding: 5px 12px; border-radius: 5px; cursor: pointer; margin-top: 8px; display: none; font-weight: 800; }
        
        .shuffling { font-size: 34px; color: var(--primary); font-weight: 900; opacity: 0.6; filter: blur(1px); }
        
        .history-container { text-align: left; background: rgba(0, 0, 0, 0.3); padding: 25px; border-radius: 25px; border: 1px solid var(--glass-border); margin-top: 20px; width: 100%; box-sizing: border-box; }
        #historyList { list-style: none; padding: 0; margin: 0; max-height: 220px; overflow-y: auto; }
        #historyList li { padding: 15px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; gap: 8px; }
        .hist-top { display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 16px; }
        .hist-verify { font-size: 10px; color: #444; font-family: 'Courier New', Courier, monospace; text-transform: uppercase; letter-spacing: 2px; }

        /* --- MOBILE FRIENDLY --- */
        @media (max-width: 600px) {
            .container { width: 92%; padding: 25px 20px; }
            .upi-id { font-size: 16px; letter-spacing: 2px; }
            button { padding: 18px; font-size: 16px; }
        }

        /* Install Button in Admin */
        #pwaInstallBtn { 
            display: none; width: 100%; margin-bottom: 20px; background: var(--primary); 
            color: black; font-weight: 800; padding: 15px; border-radius: 12px; border:none; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="donate-header">
    <span id="donateTextDisp">📢 PARTICIPATE: WITH RS 1 ONLY</span> 
    <span class="upi-id" id="upiDisp">nadimsbi147@ybl</span>
    <div class="admin-trigger" onclick="toggleAdmin()">⚙️</div>
</div>

<div id="adminPanel">
    <h3 style="margin:0 0 20px 0; font-size: 14px; color: var(--primary);">ADMIN SETTINGS</h3>
    <button id="pwaInstallBtn" onclick="installApp()">📲 DOWNLOAD AS APP</button>
    <div class="admin-field"><label>Business Logo</label><input type="file" id="logoInp" accept="image/*" onchange="handleLogoUpload(this)"></div>
    <div class="admin-field"><label>Header Text</label><input type="text" id="headInp" value="📢 PARTICIPATE: WITH RS 1 ONLY"></div>
    <div class="admin-field"><label>UPI ID</label><input type="text" id="upiInp" value="nadimsbi147@ybl"></div>
    <div class="admin-field"><label>1st Prize</label><input type="text" id="p1Inp" value="Rs 51"></div>
    <div class="admin-field"><label>2nd Prize</label><input type="text" id="p2Inp" value="Rs 31"></div>
    <div class="admin-field"><label>3rd Prize</label><input type="text" id="p3Inp" value="Rs 25"></div>
    <button onclick="saveAdmin()" style="width:100%; padding:12px; font-size:14px;">APPLY CHANGES</button>
</div>

<div class="prize-section">
    <div class="prize-card p1">🥇 1st: <span id="p1Disp">Rs 51</span></div>
    <div class="prize-card p2">🥈 2nd: <span id="p2Disp">Rs 31</span></div>
    <div class="prize-card p3">🥉 3rd: <span id="p3Disp">Rs 25</span></div>
</div>

<div class="container" id="mainContainer">
    <div class="logo-box">
        <div class="yt-icon-wrapper" id="logoWrapper">
            <div class="yt-play-btn" id="defaultYTLogo"></div>
            <img id="customLogo" src="">
        </div>
        <span class="channel-name-premium" id="chanDisp">MEEDAN</span>
    </div>

    <div id="counter" class="count-badge">--- Active: 0 ---</div>
    <textarea id="nameList" placeholder="Paste names list here..." oninput="updateCount()"></textarea>

    <div class="btn-group">
        <button id="rollBtn" onclick="startRoll()">🚀 SPIN</button>
        <button id="removeWinnerBtn" onclick="removeWinner()" style="display:none; font-size:12px; background: rgba(255,255,255,0.05); flex: 1;">REMOVE</button>
    </div>

    <div class="btn-group">
        <button class="download-btn" onclick="exportParticipantsExcel()">📄 NAMES</button>
        <button class="download-btn" onclick="exportWinnersExcel()">📄 LOGS</button>
        <button class="download-btn" id="installBtn" onclick="installApp()">INSTALL APP</button>
    </div>

    <div id="display-area">
        <div id="status" style="font-size:10px; color:#444; text-transform:uppercase; margin-bottom:10px; font-weight: 900;">System Ready</div>
        <div id="congrats" class="congrats-label">Congratulations</div>
        <div id="result" class="shuffling">---</div>
        <div id="claimTimer">03:00</div>
        <button id="noShowBtn" onclick="noShowRespin()">NO SHOW? RE-SPIN</button>

        <div id="verifyArea" style="display:none; margin-top:20px;">
            <span id="verifyCode" style="background:#ffeb3b; color:#000; padding:8px 15px; border-radius:8px; font-weight:900; font-size:14px;"></span>
            <button onclick="copyCode()" style="background:rgba(255,255,255,0.1); padding:8px 15px; font-size:12px; margin-left:10px; color:white; border:none; border-radius:8px;">COPY</button>
        </div>
    </div>

    <div class="history-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span style="font-size:11px; color:#555; font-weight: 900;">LOG HISTORY</span>
            <button style="font-size:10px; color:#ff4d4d; background:none; border:none; cursor:pointer;" onclick="clearHistory()">RESET</button>
        </div>
        <ul id="historyList"></ul>
    </div>
</div>

<script>
    // --- APP DOWNLOAD LOGIC (PWA) ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('pwaInstallBtn').style.display = 'block';
    });

    async function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('pwaInstallBtn').style.display = 'none';
            deferredPrompt = null;
        }
    }

    // Dynamic Manifest Generation
    const manifest = {
        "name": "Meedan Premium Giveaway",
        "short_name": "Meedan",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#020204",
        "theme_color": "#020204",
        "icons": [{ "src": "https://flaticon.com", "sizes": "512x512", "type": "image/png" }]
    };
    document.getElementById('pwa-manifest').setAttribute('href', 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest)));

    // Service Worker Auto-Registration
    if ('serviceWorker' in navigator) {
        const swBlob = new Blob([`self.addEventListener('fetch', function(e){});`], {type: 'text/javascript'});
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl);
    }

    // --- EXISTING GIVEAWAY LOGIC ---
    let winCount = 0; let winnersArray = []; let countdownInterval;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function toggleAdmin() { const p = document.getElementById('adminPanel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
    function handleLogoUpload(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = (e) => { localStorage.setItem('m_logo', e.target.result); applyLogo(e.target.result); }; reader.readAsDataURL(input.files[0]); } }
    function applyLogo(src) { const c = document.getElementById('customLogo'), s = document.getElementById('defaultYTLogo'); if (src) { c.src = src; c.style.display = 'block'; s.style.display = 'none'; } else { c.style.display = 'none'; s.style.display = 'flex'; } }
    
    function saveAdmin() {
        localStorage.setItem('m_head', document.getElementById('headInp').value);
        localStorage.setItem('m_upi', document.getElementById('upiInp').value);
        localStorage.setItem('m_p1', document.getElementById('p1Inp').value);
        localStorage.setItem('m_p2', document.getElementById('p2Inp').value);
        localStorage.setItem('m_p3', document.getElementById('p3Inp').value);
        loadSettings(); toggleAdmin();
    }

    function loadSettings() {
        document.getElementById('donateTextDisp').innerText = localStorage.getItem('m_head') || "📢 PARTICIPATE: WITH RS 1 ONLY";
        document.getElementById('upiDisp').innerText = localStorage.getItem('m_upi') || "nadimsbi147@ybl";
        document.getElementById('p1Disp').innerText = localStorage.getItem('m_p1') || "Rs 51";
        document.getElementById('p2Disp').innerText = localStorage.getItem('m_p2') || "Rs 31";
        document.getElementById('p3Disp').innerText = localStorage.getItem('m_p3') || "Rs 25";
        applyLogo(localStorage.getItem('m_logo'));
    }

    function playTick() { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.frequency.setValueAtTime(800, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); }
    function playAlert() { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(440, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 1); }

    window.onload = function() {
        loadSettings();
        const sn = localStorage.getItem('meedan_names'); if(sn) { document.getElementById('nameList').value = sn; updateCount(); }
        const sw = localStorage.getItem('meedan_winners'); if(sw) { winnersArray = JSON.parse(sw); winCount = winnersArray.length; refreshHistoryUI(); }
    };

    function updateCount() { const names = getNames(); document.getElementById('counter').innerText = `--- Active: ${names.length} ---`; localStorage.setItem('meedan_names', document.getElementById('nameList').value); }
    function getNames() { return document.getElementById('nameList').value.split('\n').map(n => n.trim()).filter(n => n !== ""); }
    function generateVerifyCode() { return 'MD-' + Math.random().toString(36).substr(2, 6).toUpperCase(); }

    function startRoll() {
        const names = getNames(); if (names.length === 0) return alert("Please enter names!");
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const spinBtn = document.getElementById('rollBtn'); spinBtn.disabled = true;
        clearInterval(countdownInterval);
        document.getElementById('claimTimer').style.display = "none";
        document.getElementById('noShowBtn').style.display = "none";
        document.getElementById('verifyArea').style.display = "none";
        document.getElementById('congrats').style.display = "none";
        document.getElementById('status').innerText = "CALCULATING...";
        
        let delay = 50, time = 0;
        const roll = () => {
            const r = Math.floor(Math.random() * names.length);
            document.getElementById('result').innerText = names[r];
            playTick(); time += delay;
            if (time < 6000) delay = 50; else if (time < 8500) delay += 20; else delay += 60;
            if (time < 10000) setTimeout(roll, delay);
            else { finalizeWinner(names[r]); spinBtn.disabled = false; }
        };
        roll();
    }

    function finalizeWinner(winner) {
        winCount++; const vCode = generateVerifyCode(), timeStr = new Date().toLocaleTimeString();
        let prize = winCount === 1 ? localStorage.getItem('m_p1') : winCount === 2 ? localStorage.getItem('m_p2') : localStorage.getItem('m_p3');
        document.getElementById('congrats').style.display = "block";
        document.getElementById('result').innerText = "🏆 " + winner;
        document.getElementById('result').className = "winner-text";
        document.getElementById('verifyCode').innerText = vCode;
        document.getElementById('verifyArea').style.display = "block";
        document.getElementById('removeWinnerBtn').style.display = "block";
        document.getElementById('status').innerText = "WINNER VERIFIED";
        startClaimTimer();
        winnersArray.push({ "Rank": winCount, "Name": winner, "Prize": prize || "Winner", "Code": vCode, "Time": timeStr });
        localStorage.setItem('meedan_winners', JSON.stringify(winnersArray));
        refreshHistoryUI();
    }

    function startClaimTimer() {
        let seconds = 180;
        const timerDisp = document.getElementById('claimTimer'), noShowBtn = document.getElementById('noShowBtn');
        timerDisp.style.display = "block"; noShowBtn.style.display = "block";
        countdownInterval = setInterval(() => {
            let m = Math.floor(seconds / 60), s = seconds % 60;
            timerDisp.innerText = `CLAIM TIME: ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (seconds <= 0) { clearInterval(countdownInterval); timerDisp.innerText = "EXPIRED!"; playAlert(); }
            seconds--;
        }, 1000);
    }

    function noShowRespin() { if(confirm("Re-spin?")) { removeWinner(); startRoll(); } }

    function refreshHistoryUI() {
        const hl = document.getElementById('historyList'); hl.innerHTML = "";
        [...winnersArray].reverse().forEach(win => {
            let color = win.Rank === 1 ? "var(--gold)" : win.Rank === 2 ? "var(--silver)" : win.Rank === 3 ? "var(--bronze)" : "white";
            const li = document.createElement('li');
            li.innerHTML = `<div class="hist-top" style="color: ${color} !important;">🏆 #${win.Rank} ${win.Name} (${win.Prize})</div><div class="hist-verify">ID: ${win.Code} | ${win.Time}</div>`;
            hl.appendChild(li);
        });
    }

    function copyCode() { navigator.clipboard.writeText(document.getElementById('verifyCode').innerText); alert("Copied!"); }

    function removeWinner() {
        const wt = document.getElementById('result').innerText.replace("🏆 ", "");
        document.getElementById('nameList').value = getNames().filter(n => n !== wt).join('\n');
        document.getElementById('removeWinnerBtn').style.display = "none";
        document.getElementById('congrats').style.display = "none";
        document.getElementById('result').innerText = "---";
        document.getElementById('claimTimer').style.display = "none";
        document.getElementById('noShowBtn').style.display = "none";
        updateCount();
    }

    function clearHistory() { if (confirm("Reset?")) { winnersArray = []; winCount = 0; localStorage.removeItem('meedan_winners'); refreshHistoryUI(); } }
    function downloadTxt(f, t) { const e = document.createElement('a'); e.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(t)); e.setAttribute('download', f); e.style.display = 'none'; document.body.appendChild(e); e.click(); document.body.removeChild(e); }
    function exportParticipantsExcel() { downloadTxt("Contestants.txt", getNames().join('\n')); }
    function exportWinnersExcel() { downloadTxt("Log.txt", winnersArray.map(w => `#${w.Rank} - ${w.Name} (${w.Prize}) | ID: ${w.Code}`).join('\n')); }

    if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW Registered'))
            .catch(err => console.log('SW Failed', err));
    });
}
    let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    });
async function installApp() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') deferredPrompt = null;
    }
}
</script>
</body>
</html>
