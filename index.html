<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meedan Elite Premium - Giveaway</title>
    <link rel="manifest" id="pwa-manifest">

    <style>
        :root { 
            /* DARK MODE (DEFAULT) */
            --primary: #00f2ff; --accent: #7000ff; --bg: #020204; 
            --card: rgba(15, 15, 25, 0.7); --text: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.05);
            --gold: #ffd700; --silver: #e0e0e0; --bronze: #cd7f32; 
        }

        /* ELITE LIGHT MODE READABILITY FIX */
        body.light-mode {
            --bg: #f4f7f6;
            --card: rgba(255, 255, 255, 0.9);
            --text: #121212;
            --glass-border: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            background: radial-gradient(circle at 0% 0%, var(--accent) -80%, var(--bg) 100%);
            color: var(--text); display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding-bottom: 60px; overflow-x: hidden;
            transition: background 0.4s ease;
        }

        .donate-header { 
            width: 100%; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            padding: 20px 0; text-align: center; border-bottom: 1px solid var(--glass-border); 
            position: sticky; top: 0; z-index: 1000;
        }
        body.light-mode .donate-header { background: rgba(255, 255, 255, 0.8); }

        .upi-id { display: block; font-size: 24px; margin-top: 5px; color: var(--primary); letter-spacing: 5px; font-weight: 800; }
        body.light-mode .upi-id { color: var(--accent); }
        
        .admin-trigger { position: absolute; right: 30px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 22px; opacity: 0.5; transition: 0.3s; }
        .admin-trigger:hover { opacity: 1; transform: translateY(-50%) rotate(90deg); }
        
        #adminPanel, #customConfirm {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card); border: 1px solid var(--primary);
            padding: 40px; border-radius: 30px; z-index: 9999; width: 350px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5); backdrop-filter: blur(30px);
            color: var(--text);
        }

        .admin-field { margin-bottom: 20px; text-align: left; }
        .admin-field label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 8px; font-weight: 900; text-transform: uppercase; }
        .admin-field input, .admin-field select { width: 100%; background: var(--input-bg); border: 1px solid #333; color: var(--text); padding: 12px; border-radius: 12px; outline: none; box-sizing: border-box; }

        .prize-section { width: 100%; max-width: 600px; padding: 40px 0 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .prize-card { padding: 15px 25px; border-radius: 20px; background: var(--card); border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .container { 
            background: var(--card); padding: 60px; border-radius: 50px; width: 550px; text-align: center; 
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); 
            margin: 20px 0; backdrop-filter: blur(40px);
        }

        .logo-box { margin-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        #customLogo { max-width: 120px; border-radius: 15px; margin-bottom: 15px; display: none; }
        .channel-name-premium { font-size: 38px; font-weight: 900; letter-spacing: -2px; }

        textarea { width: 100%; height: 140px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 25px; color: var(--text); padding: 25px; font-size: 16px; resize: none; outline: none; box-sizing: border-box; }

        button#rollBtn { background: linear-gradient(135deg, var(--accent), #ff00c8); color: white; border: none; padding: 25px; font-size: 18px; font-weight: 900; border-radius: 25px; cursor: pointer; width: 100%; margin-top: 30px; box-shadow: 0 10px 30px rgba(112, 0, 255, 0.3); }
        
        #display-area { min-height: 250px; margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 40px; }
        .winner-text { font-size: 52px; font-weight: 900; color: var(--text); text-shadow: 0 0 30px var(--primary); }
        
        .history-container { text-align: left; background: var(--input-bg); padding: 35px; border-radius: 35px; border: 1px solid var(--glass-border); margin-top: 40px; width: 100%; box-sizing: border-box; }
        #historyList { list-style: none; padding: 0; margin: 0; }
        #historyList li { padding: 15px 0; border-bottom: 1px solid var(--glass-border); }

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; }
        .btn-confirm { background: var(--primary); color: #000; }
        .btn-cancel { background: rgba(128,128,128,0.2); color: var(--text); }

        @media (max-width: 600px) { .container { width: 90%; padding: 40px 25px; } }
    </style>
</head>
<body>

<div class="donate-header">
    <span id="donateTextDisp">📢 PARTICIPATE: WITH RS 1 ONLY</span> 
    <span class="upi-id" id="upiDisp">nadimsbi147@ybl</span>
    <span class="admin-trigger" onclick="toggleAdmin()">⚙️</span>
</div>

<div id="customConfirm">
    <div style="font-size: 14px; font-weight: 900;">SYSTEM RE-SPIN?</div>
    <div class="modal-btns">
        <button class="modal-btn btn-confirm" onclick="confirmAction(true)">Confirm</button>
        <button class="modal-btn btn-cancel" onclick="confirmAction(false)">Cancel</button>
    </div>
</div>

<div id="adminPanel">
    <h3 style="margin:0 0 25px 0; color:var(--primary); font-size:16px;">TERMINAL SETTINGS</h3>
    <div class="admin-field">
        <label>Display Mode</label>
        <select id="themeInp">
            <option value="dark">Elite Dark</option>
            <option value="light">Elite Light</option>
        </select>
    </div>
    <div class="admin-field"><label>Business Logo</label><input type="file" onchange="handleLogoUpload(this)"></div>
    <div class="admin-field"><label>Header Text</label><input type="text" id="headInp"></div>
    <div class="admin-field"><label>UPI ID</label><input type="text" id="upiInp"></div>
    <div class="admin-field"><label>1st Prize</label><input type="text" id="p1Inp"></div>
    <div class="admin-field"><label>2nd Prize</label><input type="text" id="p2Inp"></div>
    <div class="admin-field"><label>3rd Prize</label><input type="text" id="p3Inp"></div>
    <button onclick="saveAdmin()" style="width:100%; padding:18px; font-size:14px; background: var(--primary); color: #000; border:none; border-radius:15px; font-weight:900; cursor:pointer;">APPLY CHANGES</button>
</div>

<div class="prize-section">
    <div class="prize-card p1" style="color:var(--gold)">🥇 <span id="p1Disp"></span></div>
    <div class="prize-card p2" style="color:var(--silver)">🥈 <span id="p2Disp"></span></div>
    <div class="prize-card p3" style="color:var(--bronze)">🥉 <span id="p3Disp"></span></div>
</div>

<div class="container">
    <div class="logo-box">
        <img id="customLogo" src="" alt="">
        <div class="yt-icon-wrapper" id="defaultYTLogo">
            <span class="channel-name-premium">MEEDAN</span>
        </div>
    </div>
    <div id="counter" style="font-size:10px; color:var(--primary); font-weight:900; margin-bottom:20px;">--- Active: 0 ---</div>
    <textarea id="nameList" oninput="updateCount()" placeholder="Enter participant names..."></textarea>
    <button id="rollBtn" onclick="startRoll()">⚡ INITIATE DRAW</button>
    <div id="display-area">
        <div id="status" style="font-size:10px; opacity:0.5; margin-bottom:15px;">Standby</div>
        <div id="congrats" class="congrats-label" style="display:none; color:var(--gold); font-weight:900; margin-bottom:10px;">WINNER VERIFIED</div>
        <div id="result" class="winner-text">---</div>
        <div id="verifyArea" style="display:none; margin-top:20px;">
            <div id="verifyCode" style="color:var(--primary); font-family:monospace; font-weight:900; cursor:pointer;" onclick="copyCode()">######</div>
        </div>
        <div id="claimTimer" style="display:none; color:#ff4d4d; margin-top:15px; font-weight:800;">03:00</div>
        <button id="noShowBtn" onclick="noShowRespin()" style="display:none; background:none; border:1px solid #ff4d4d; color:#ff4d4d; font-size:10px; padding:8px 15px; border-radius:10px; margin-top:10px; cursor:pointer;">RE-SPIN (NO SHOW)</button>
        <div id="removeWinnerBtn" onclick="removeWinner()" style="display:none; color:#ff4d4d; font-size:11px; margin-top:20px; cursor:pointer;">[ Purge Winner ]</div>
    </div>
    <div class="history-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <span style="font-size:11px; font-weight:900; opacity:0.6;">LOG HISTORY</span>
            <span onclick="clearHistory()" style="font-size:11px; color:#ff4d4d; cursor:pointer; font-weight:800;">RESET</span>
        </div>
        <ul id="historyList"></ul>
    </div>
</div>

<script>
    let winCount = 0; let winnersArray = []; let countdownInterval;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    window.onload = function() {
        loadSettings();
        const sn = localStorage.getItem('meedan_names'); if(sn) { document.getElementById('nameList').value = sn; updateCount(); }
        const sw = localStorage.getItem('meedan_winners'); if(sw) { winnersArray = JSON.parse(sw); winCount = winnersArray.length; refreshHistoryUI(); }
        document.getElementById('adminPanel').style.display = 'none';
    };

    function toggleAdmin() { const p = document.getElementById('adminPanel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
    function noShowRespin() { document.getElementById('customConfirm').style.display = 'block'; }
    function confirmAction(c) { document.getElementById('customConfirm').style.display = 'none'; if(c) { removeWinner(); startRoll(); } }
    
    function handleLogoUpload(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = (e) => { localStorage.setItem('m_logo', e.target.result); applyLogo(e.target.result); }; reader.readAsDataURL(input.files[0]); } }
    function applyLogo(src) { const c = document.getElementById('customLogo'), s = document.getElementById('defaultYTLogo'); if (src) { c.src = src; c.style.display = 'block'; s.style.display = 'none'; } else { c.style.display = 'none'; s.style.display = 'flex'; } }
    
    function saveAdmin() {
        localStorage.setItem('m_head', document.getElementById('headInp').value);
        localStorage.setItem('m_upi', document.getElementById('upiInp').value);
        localStorage.setItem('m_p1', document.getElementById('p1Inp').value);
        localStorage.setItem('m_p2', document.getElementById('p2Inp').value);
        localStorage.setItem('m_p3', document.getElementById('p3Inp').value);
        localStorage.setItem('m_theme', document.getElementById('themeInp').value);
        loadSettings(); toggleAdmin();
    }

    function loadSettings() {
        const theme = localStorage.getItem('m_theme') || 'dark';
        document.body.className = theme === 'light' ? 'light-mode' : 'dark-mode';
        document.getElementById('themeInp').value = theme;
        document.getElementById('donateTextDisp').innerText = localStorage.getItem('m_head') || "📢 PARTICIPATE: WITH RS 1 ONLY";
        document.getElementById('upiDisp').innerText = localStorage.getItem('m_upi') || "nadimsbi147@ybl";
        document.getElementById('p1Disp').innerText = localStorage.getItem('m_p1') || "Rs 51";
        document.getElementById('p2Disp').innerText = localStorage.getItem('m_p2') || "Rs 31";
        document.getElementById('p3Disp').innerText = localStorage.getItem('m_p3') || "Rs 25";
        document.getElementById('headInp').value = localStorage.getItem('m_head') || "";
        document.getElementById('upiInp').value = localStorage.getItem('m_upi') || "";
        document.getElementById('p1Inp').value = localStorage.getItem('m_p1') || "";
        document.getElementById('p2Inp').value = localStorage.getItem('m_p2') || "";
        document.getElementById('p3Inp').value = localStorage.getItem('m_p3') || "";
        applyLogo(localStorage.getItem('m_logo'));
    }

    function playTick() { if (audioCtx.state === 'suspended') audioCtx.resume(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.frequency.setValueAtTime(800, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); }
    function playAlert() { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(440, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 1); }

    function updateCount() { const names = getNames(); document.getElementById('counter').innerText = `--- System Active: ${names.length} ---`; localStorage.setItem('meedan_names', document.getElementById('nameList').value); }
    function getNames() { return document.getElementById('nameList').value.split('\n').map(n => n.trim()).filter(n => n !== ""); }
    function generateVerifyCode() { return 'MD-' + Math.random().toString(36).substr(2, 6).toUpperCase(); }

    function startRoll() {
        const names = getNames(); if (names.length === 0) return alert("Registry Empty.");
        const spinBtn = document.getElementById('rollBtn'); spinBtn.disabled = true;
        clearInterval(countdownInterval);
        document.getElementById('claimTimer').style.display = "none";
        document.getElementById('noShowBtn').style.display = "none";
        document.getElementById('verifyArea').style.display = "none";
        document.getElementById('congrats').style.display = "none";
        document.getElementById('status').innerText = "DRAWING...";
        
        let delay = 50, time = 0;
        const roll = () => {
            const r = Math.floor(Math.random() * names.length);
            document.getElementById('result').innerText = names[r];
            playTick(); time += delay;
            if (time < 3000) setTimeout(roll, delay);
            else { finalizeWinner(names[r]); spinBtn.disabled = false; }
        };
        roll();
    }

    function finalizeWinner(winner) {
        winCount++; const vCode = generateVerifyCode(), timeStr = new Date().toLocaleTimeString();
        let prize = winCount === 1 ? localStorage.getItem('m_p1') : winCount === 2 ? localStorage.getItem('m_p2') : localStorage.getItem('m_p3');
        document.getElementById('congrats').style.display = "block";
        document.getElementById('result').innerText = "🏆 " + winner;
        document.getElementById('verifyCode').innerText = vCode;
        document.getElementById('verifyArea').style.display = "block";
        document.getElementById('removeWinnerBtn').style.display = "block";
        document.getElementById('status').innerText = "VERIFIED";
        startClaimTimer();
        winnersArray.push({ "Rank": winCount, "Name": winner, "Prize": prize || "Winner", "Code": vCode, "Time": timeStr });
        localStorage.setItem('meedan_winners', JSON.stringify(winnersArray));
        refreshHistoryUI();
    }

    function startClaimTimer() {
        let seconds = 180;
        countdownInterval = setInterval(() => {
            let m = Math.floor(seconds / 60), s = seconds % 60;
            document.getElementById('claimTimer').style.display = "block";
            document.getElementById('noShowBtn').style.display = "block";
            document.getElementById('claimTimer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (seconds <= 0) { clearInterval(countdownInterval); playAlert(); }
            seconds--;
        }, 1000);
    }

    function refreshHistoryUI() {
        const hl = document.getElementById('historyList'); hl.innerHTML = "";
        [...winnersArray].reverse().forEach(win => {
            const li = document.createElement('li');
            li.innerHTML = `<div style="display:flex;justify-content:space-between;font-weight:800;">🏆 #${win.Rank} ${win.Name}</div><div style="font-size:10px;opacity:0.6;">ID: ${win.Code}</div>`;
            hl.appendChild(li);
        });
    }

    function copyCode() { navigator.clipboard.writeText(document.getElementById('verifyCode').innerText); alert("Copied!"); }
    function removeWinner() {
        const wt = document.getElementById('result').innerText.replace("🏆 ", "");
        document.getElementById('nameList').value = getNames().filter(n => n !== wt).join('\n');
        document.getElementById('removeWinnerBtn').style.display = "none";
        document.getElementById('congrats').style.display = "none";
        document.getElementById('result').innerText = "---";
        document.getElementById('claimTimer').style.display = "none";
        document.getElementById('noShowBtn').style.display = "none";
        updateCount();
    }
    function clearHistory() { if (confirm("Reset Data?")) { winnersArray = []; winCount = 0; localStorage.removeItem('meedan_winners'); refreshHistoryUI(); } }
</script>
</body>
</html>
